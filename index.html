<html lang="ko">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #E8F4F8;
  --surface: #F0F9FC;
  --border: rgba(0, 105, 148, 0.08);
  --border-strong: rgba(0, 105, 148, 0.15);
  --text-primary: #0D4A6D;
  --text-secondary: #2B7A99;
  --text-tertiary: #6BA3B8;
  --radius: 12px;
  --radius-sm: 8px;
  --lnb-w: 220px;
  --ocean-dark: #006994;
  --ocean-light: #00A8CC;
  --sand: #F4D9B8;
  --coral: #FF6B6B;
  --seashell: #FFE5E5;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #E8F4F8 0%, #D4E8F0 100%);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

/* ───────── HEADER ───────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--ocean-light) 100%);
  border-bottom: 3px solid var(--sand);
  position: relative;
  z-index: 200;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0, 105, 148, 0.15);
}

.header-left { display: flex; align-items: center; gap: 14px; }

.logo {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.5px;
  color: #FFFFFF;
  text-decoration: none;
  transition: opacity 0.15s;
}
.logo:hover { opacity: 0.8; }
.logo span { color: var(--sand); }

.today-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ocean-dark);
  background: var(--sand);
  border: 1px solid rgba(244, 217, 184, 0.5);
  border-radius: 20px;
  padding: 4px 12px;
}

/* ───────── LAYOUT ───────── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ───────── LNB ───────── */
.lnb {
  width: var(--lnb-w);
  flex-shrink: 0;
  background: linear-gradient(180deg, #F0F9FC 0%, #E0EEF5 100%);
  border-right: 2px solid var(--ocean-light);
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  gap: 4px;
  overflow-y: auto;
}

.lnb-section-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 8px;
  margin: 12px 0 4px;
}
.lnb-section-label:first-child { margin-top: 0; }

.lnb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: background 0.12s, color 0.12s;
  font-family: 'DM Sans', sans-serif;
}
.lnb-item:hover { background: rgba(0, 168, 204, 0.1); color: var(--ocean-dark); }
.lnb-item.active { background: rgba(0, 168, 204, 0.2); color: var(--ocean-dark); font-weight: 500; }

.lnb-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.6;
}
.lnb-item.active .lnb-icon,
.lnb-item:hover .lnb-icon { opacity: 1; }

.lnb-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

.lnb-new-col {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  border: 1px dashed var(--ocean-light);
  background: none;
  width: 100%;
  text-align: left;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  font-family: 'DM Sans', sans-serif;
  margin-top: 4px;
}
.lnb-new-col:hover { background: rgba(0, 168, 204, 0.1); color: var(--ocean-dark); border-color: var(--ocean-dark); }

/* ───────── MAIN CONTENT ───────── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ───────── PAGE ───────── */
.page { display: none; flex: 1; overflow: hidden; }
.page.active { display: flex; flex-direction: column; }

/* ── BOARD PAGE ── */
#board-wrap {
  flex: 1;
  overflow-x: auto;
  padding: 24px 28px 28px;
}
#board {
  display: flex;
  gap: 16px;
  min-height: 100%;
  align-items: flex-start;
}

/* ── DASHBOARD PAGE ── */
#page-dashboard {
  padding: 28px 32px;
  overflow-y: auto;
}
.dash-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: var(--ocean-dark); }
.dash-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }

.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.dash-card {
  background: linear-gradient(135deg, #FFFFFF 0%, #F5FBFD 100%);
  border: 1.5px solid var(--ocean-light);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0, 168, 204, 0.1);
}
.dash-card-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
.dash-card-num { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--ocean-dark); }
.dash-card-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

.dash-cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.dash-col-card {
  background: linear-gradient(135deg, #FFFFFF 0%, #F5FBFD 100%);
  border: 1.5px solid var(--ocean-light);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: 0 2px 8px rgba(0, 168, 204, 0.1);
}
.dash-col-name { font-size: 13px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; color: var(--ocean-dark); }
.dash-col-bar-wrap { background: rgba(0, 168, 204, 0.1); border-radius: 4px; height: 6px; overflow: hidden; }
.dash-col-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; background: linear-gradient(90deg, var(--ocean-light), var(--ocean-dark)); }
.dash-col-count { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

/* ── DONE PAGE ── */
#page-done {
  padding: 28px 32px;
  overflow-y: auto;
}
.done-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: var(--ocean-dark); }
.done-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
.done-empty { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 13px; }
.done-list { display: flex; flex-direction: column; gap: 8px; }
.done-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #FFFFFF 0%, #F5FBFD 100%);
  border: 1.5px solid var(--ocean-light);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
}
.done-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.done-item-text { flex: 1; font-size: 13.5px; }
.done-item-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary); }
.done-item-col { font-size: 11px; color: var(--text-secondary); background: rgba(0, 168, 204, 0.1); border-radius: 20px; padding: 2px 10px; }
.done-restore {
  background: none; border: 1px solid var(--ocean-light);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  color: var(--ocean-dark); cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.done-restore:hover { background: rgba(0, 168, 204, 0.1); color: var(--ocean-dark); }

/* ── SETTINGS PAGE ── */
#page-settings {
  padding: 28px 32px;
  overflow-y: auto;
}
.settings-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: var(--ocean-dark); }
.settings-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
.settings-section { margin-bottom: 28px; }
.settings-section-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(135deg, #FFFFFF 0%, #F5FBFD 100%);
  border: 1.5px solid var(--ocean-light);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 8px;
}
.settings-row-label { font-size: 13.5px; }
.settings-row-desc { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

.theme-btns { display: flex; gap: 6px; }
.theme-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--ocean-light); background: rgba(0, 168, 204, 0.1);
  cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-secondary);
  transition: background 0.1s, color 0.1s;
}
.theme-btn.active { background: var(--ocean-light); color: #fff; border-color: var(--ocean-dark); }

.danger-btn {
  padding: 6px 16px; border-radius: 6px; font-size: 12px;
  border: 1px solid var(--coral); background: var(--seashell);
  color: var(--coral); cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.danger-btn:hover { background: rgba(255, 107, 107, 0.1); }

/* ───────── COLUMN ───────── */
.column {
  width: 275px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-radius: var(--radius);
  border: 2px solid var(--ocean-light);
  background: linear-gradient(135deg, #FFFFFF 0%, #F5FBFD 100%);
  min-height: 200px;
  max-height: calc(100vh - 100px);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.25s ease both;
  box-shadow: 0 4px 12px rgba(0, 105, 148, 0.1);
}
.column.drag-target { border-color: var(--ocean-dark); box-shadow: 0 0 0 3px rgba(0, 168, 204, 0.2); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.col-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.col-header-top { display: flex; align-items: center; gap: 8px; }
.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.col-title-input {
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
  color: var(--text-primary); background: transparent; border: none;
  outline: none; flex: 1; cursor: text; min-width: 0;
}
.col-title-input:focus { background: rgba(0, 168, 204, 0.1); border-radius: 4px; padding: 1px 4px; margin: -1px -4px; }
.col-count {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary);
  background: rgba(0, 168, 204, 0.1); border-radius: 20px; padding: 2px 7px;
  border: 1px solid var(--border); margin-left: auto; flex-shrink: 0;
}
.col-desc-input {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--text-tertiary);
  background: transparent; border: none; outline: none; width: 100%;
  cursor: text; resize: none; height: 17px; overflow: hidden;
}
.col-desc-input:focus { color: var(--text-secondary); }
.col-desc-input::placeholder { color: var(--text-tertiary); font-style: italic; }
.col-header-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
.col-header:hover .col-header-actions { opacity: 1; }
.col-icon-btn {
  background: none; border: none; cursor: pointer; color: var(--text-tertiary);
  padding: 3px 5px; border-radius: 5px; font-size: 12px; line-height: 1;
  transition: background 0.1s, color 0.1s;
}
.col-icon-btn:hover { background: rgba(0, 168, 204, 0.1); color: var(--text-secondary); }
.col-icon-btn.danger:hover { background: var(--seashell); color: var(--coral); }

/* ── CARDS ── */
.cards-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 7px; min-height: 60px;
}
.cards-list::-webkit-scrollbar { width: 3px; }
.cards-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.card {
  background: linear-gradient(135deg, #FFFFFF 0%, #F8FCFE 100%);
  border: 1.5px solid rgba(0, 168, 204, 0.3);
  border-radius: var(--radius-sm); padding: 10px 12px;
  cursor: grab; user-select: none;
  transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
  position: relative; animation: cardIn 0.18s ease both;
}
@keyframes cardIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
.card:hover { box-shadow: 0 4px 12px rgba(0, 168, 204, 0.2); border-color: var(--ocean-light); }
.card.dragging { opacity: 0.28; transform: scale(0.97); cursor: grabbing; }

.card-tag {
  display: inline-block; font-size: 10px; font-weight: 500;
  font-family: 'DM Mono', monospace; padding: 2px 8px;
  border-radius: 20px; margin-bottom: 6px; letter-spacing: 0.3px;
}
.card-text { font-size: 13px; line-height: 1.5; color: var(--text-primary); word-break: break-word; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
.card-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-tertiary); }
.card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
.card:hover .card-actions { opacity: 1; }
.card-btn {
  background: none; border: none; cursor: pointer; color: var(--text-tertiary);
  padding: 2px 4px; border-radius: 4px; font-size: 11px; line-height: 1;
  transition: background 0.1s, color 0.1s;
}
.card-btn:hover { background: var(--border); color: var(--text-secondary); }
.card-btn.done-btn:hover { background: rgba(0, 168, 204, 0.2); color: var(--ocean-dark); }
.card-btn.danger:hover { background: var(--seashell); color: var(--coral); }

/* ── ADD CARD ── */
.add-card-area { padding: 7px 8px 9px; flex-shrink: 0; border-top: 1px solid var(--border); }
.add-card-input {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 12.5px;
  color: var(--text-primary); background: transparent;
  border: 1px dashed var(--ocean-light); border-radius: var(--radius-sm);
  padding: 7px 10px; outline: none; resize: none; height: 34px; overflow: hidden;
  transition: border-color 0.15s, height 0.15s, background 0.15s;
}
.add-card-input::placeholder { color: var(--text-tertiary); }
.add-card-input:focus { border-style: solid; background: rgba(0, 168, 204, 0.1); height: 66px; }
.add-card-footer { display: none; justify-content: flex-end; gap: 6px; margin-top: 5px; }
.add-card-input:focus ~ .add-card-footer { display: flex; }
.btn-cancel {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--text-secondary);
  background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer;
}
.btn-save {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 500;
  color: #FFFFFF; background: var(--ocean-light); border: none;
  border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.9; background: var(--ocean-dark); }

/* ── ADD COL GHOST ── */
.add-col-ghost {
  width: 240px; flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; border: 1.5px dashed var(--ocean-light);
  border-radius: var(--radius); min-height: 100px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s; color: var(--text-tertiary);
  font-size: 13px; gap: 7px;
}
.add-col-ghost:hover { background: rgba(0, 168, 204, 0.1); border-color: var(--ocean-dark); color: var(--text-secondary); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 20px 12px; color: var(--text-tertiary); font-size: 12px; line-height: 1.6; pointer-events: none; }
.empty-icon { font-size: 20px; margin-bottom: 6px; opacity: 0.35; }

/* ───────── MODAL ───────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 999;
  align-items: center; justify-content: center;
}
