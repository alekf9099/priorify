<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priorify — 일정 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.07);
  --border-strong: rgba(0,0,0,0.13);
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-tertiary: #A8A8A8;
  --radius: 12px;
  --radius-sm: 8px;
  --lnb-w: 220px;
  --accent: #6366F1;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

body.dark {
  --bg: #121212;
  --surface: #1E1E1E;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text-primary: #E5E5E5;
  --text-secondary: #A0A0A0;
  --text-tertiary: #666666;
}

/* ───────── HEADER ───────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 200;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 14px; }
.lnb-toggle {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.lnb-toggle:hover {
  background: var(--surface);
  color: var(--text-primary);
  border-color: var(--text-primary);
}

.layout.lnb-closed .lnb {
  width: 0;
  padding-left: 0;
  padding-right: 0;
  border-right: 0;
  overflow: hidden;
}
.header-right { display: flex; align-items: center; }

.logo {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.5px;
  color: var(--text-primary);
  text-decoration: none;
  transition: opacity 0.15s;
}
.logo:hover { opacity: 0.6; }
.logo span { color: var(--text-tertiary); }

.today-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg);
  border: 1px solid var(--border-strong);
  border-radius: 20px;
  padding: 4px 12px;
}

.login-btn {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.login-btn:hover {
  background: var(--surface);
  color: var(--text-primary);
  border-color: var(--text-primary);
}

/* ───────── LAYOUT ───────── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ───────── LNB ───────── */
.lnb {
  width: var(--lnb-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  gap: 4px;
  overflow-y: auto;
  transition: width 0.22s ease, padding 0.22s ease, border-color 0.22s ease;
}

.lnb-section-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 8px;
  margin: 12px 0 4px;
}
.lnb-section-label:first-child { margin-top: 0; }

.lnb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: background 0.12s, color 0.12s;
  font-family: 'DM Sans', sans-serif;
}
.lnb-item:hover { background: var(--bg); color: var(--text-primary); }
.lnb-item.active { background: var(--bg); color: var(--text-primary); font-weight: 500; }

.lnb-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.6;
}
.lnb-item.active .lnb-icon,
.lnb-item:hover .lnb-icon { opacity: 1; }

.lnb-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

.lnb-new-col {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  border: 1px dashed var(--border-strong);
  background: none;
  width: 100%;
  text-align: left;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  font-family: 'DM Sans', sans-serif;
  margin-top: 4px;
}
.lnb-new-col:hover { background: var(--bg); color: var(--text-primary); border-color: var(--text-primary); }

/* ───────── MAIN CONTENT ───────── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ───────── PAGE ───────── */
.page { 
  display: none !important; 
  flex: 1; 
  overflow: hidden; 
  position: relative;
  visibility: hidden;
  pointer-events: none;
}
.page.active { 
  display: flex !important; 
  flex-direction: column; 
  visibility: visible;
  pointer-events: auto;
}

/* ── BOARD PAGE ── */
#page-board {
  position: relative;
}

.plant-widget {
  position: absolute;
  right: 28px;
  bottom: 22px;
  width: 280px;
  height: 126px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.74), rgba(255,255,255,0.46)),
    var(--surface);
  box-shadow: 0 18px 45px rgba(26, 26, 26, 0.08);
  backdrop-filter: blur(10px);
  z-index: 30;
  pointer-events: none;
}

body.dark .plant-widget {
  background:
    linear-gradient(135deg, rgba(30,30,30,0.84), rgba(30,30,30,0.58)),
    var(--surface);
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
}

.plant-info {
  min-width: 0;
}

.plant-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 6px;
}

.plant-status {
  font-size: 13.5px;
  color: var(--text-primary);
  line-height: 1.4;
}

.plant-scene {
  width: 92px;
  height: 96px;
  position: relative;
  flex-shrink: 0;
}

.plant-glow {
  position: absolute;
  left: 50%;
  bottom: 13px;
  width: 72px;
  height: 32px;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(16,185,129,0.18) 0%, rgba(16,185,129,0) 70%);
  border-radius: 50%;
}

.plant {
  position: absolute;
  left: 50%;
  bottom: 29px;
  width: 72px;
  height: 66px;
  transform: translateX(-50%);
}

.plant-stem {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 5px;
  height: calc(20px + var(--plant-growth, 0) * 4px);
  max-height: 58px;
  transform: translateX(-50%);
  border-radius: 99px;
  background: linear-gradient(180deg, #34D399, #059669);
  transform-origin: bottom center;
  transition: height 0.55s cubic-bezier(0.2, 0.9, 0.2, 1);
}

.plant-leaf {
  position: absolute;
  bottom: calc(8px + var(--leaf-y, 0) * 1px);
  width: 25px;
  height: 13px;
  background: linear-gradient(135deg, #6EE7B7, #10B981);
  border-radius: 999px 999px 999px 2px;
  opacity: var(--leaf-opacity, 0);
  transform: scale(var(--leaf-scale, 0.2)) rotate(var(--leaf-rotate, 0deg));
  transition: opacity 0.35s ease, transform 0.55s cubic-bezier(0.2, 0.9, 0.2, 1);
}

.leaf-left {
  left: 12px;
  transform-origin: right center;
}

.leaf-right {
  right: 12px;
  border-radius: 999px 999px 2px 999px;
  transform-origin: left center;
}

.leaf-a { --leaf-y: 7; --leaf-rotate: -24deg; }
.leaf-b { --leaf-y: 19; --leaf-rotate: 24deg; }
.leaf-c { --leaf-y: 31; --leaf-rotate: -20deg; }
.leaf-d { --leaf-y: 42; --leaf-rotate: 20deg; }

.plant-bloom {
  position: absolute;
  left: 50%;
  bottom: 55px;
  width: 18px;
  height: 18px;
  transform: translateX(-50%) scale(var(--bloom-scale, 0));
  opacity: var(--bloom-opacity, 0);
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 50%, #FFF7ED 0 22%, transparent 23%),
    radial-gradient(circle at 50% 0%, #F9A8D4 0 34%, transparent 35%),
    radial-gradient(circle at 100% 50%, #F9A8D4 0 34%, transparent 35%),
    radial-gradient(circle at 50% 100%, #F9A8D4 0 34%, transparent 35%),
    radial-gradient(circle at 0% 50%, #F9A8D4 0 34%, transparent 35%);
  transition: opacity 0.35s ease, transform 0.55s cubic-bezier(0.2, 0.9, 0.2, 1);
}

.plant-pot {
  position: absolute;
  left: 50%;
  bottom: 3px;
  width: 54px;
  height: 34px;
  transform: translateX(-50%);
  border-radius: 0 0 14px 14px;
  background: linear-gradient(135deg, #D8A36A, #A7663F);
  border: 1px solid rgba(91, 55, 31, 0.18);
  box-shadow: inset -8px -8px 16px rgba(91, 55, 31, 0.16);
}

.plant-pot-lip {
  position: absolute;
  left: 50%;
  top: -8px;
  width: 64px;
  height: 14px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: linear-gradient(135deg, #E7B47A, #B97245);
  border: 1px solid rgba(91, 55, 31, 0.16);
}

.plant-widget[data-stage="1"] .leaf-a,
.plant-widget[data-stage="2"] .leaf-a,
.plant-widget[data-stage="3"] .leaf-a,
.plant-widget[data-stage="4"] .leaf-a,
.plant-widget[data-stage="5"] .leaf-a {
  --leaf-opacity: 1;
  --leaf-scale: 0.85;
}

.plant-widget[data-stage="2"] .leaf-b,
.plant-widget[data-stage="3"] .leaf-b,
.plant-widget[data-stage="4"] .leaf-b,
.plant-widget[data-stage="5"] .leaf-b {
  --leaf-opacity: 1;
  --leaf-scale: 0.95;
}

.plant-widget[data-stage="3"] .leaf-c,
.plant-widget[data-stage="4"] .leaf-c,
.plant-widget[data-stage="5"] .leaf-c {
  --leaf-opacity: 1;
  --leaf-scale: 0.95;
}

.plant-widget[data-stage="4"] .leaf-d,
.plant-widget[data-stage="5"] .leaf-d {
  --leaf-opacity: 1;
  --leaf-scale: 1;
}

.plant-widget[data-stage="5"] .plant-bloom {
  --bloom-opacity: 1;
  --bloom-scale: 1;
}

.plant-widget.grow-pulse .plant {
  animation: plantPulse 0.55s ease;
}

@keyframes plantPulse {
  0% { transform: translateX(-50%) scale(1); }
  45% { transform: translateX(-50%) scale(1.08); }
  100% { transform: translateX(-50%) scale(1); }
}
#board-wrap {
  flex: 1;
  overflow-x: auto;
  padding: 24px 28px 170px;  
}
#board {
  display: flex;
  gap: 16px;
  min-height: 100%;
  align-items: flex-start;
}

/* ── DASHBOARD PAGE ── */
#page-dashboard {
  padding: 28px 32px;
  overflow-y: auto;
}
.dash-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.dash-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }

.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.dash-card-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
.dash-card-num { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; }

.dash-cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.dash-col-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.dash-col-name { font-size: 13px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
.dash-col-bar-wrap { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
.dash-col-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.dash-col-count { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

/* ── EMOTION TRASH PAGE ── */
#page-trash {
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  background: linear-gradient(180deg, #FFF5F9 0%, #FFEBF0 100%);
  overflow: hidden;
  z-index: 1;
}
.trash-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  position: relative;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

/* 귀여운 쓰레기통 캐릭터 */
.trash-bag-wrap {
  position: relative;
  width: 200px;
  height: 280px;
  margin-bottom: 40px;
  z-index: 1;
}

.trash-bag {
  position: relative;
  width: 160px;
  height: 200px;
  background: linear-gradient(135deg, #FFB6D9 0%, #FFC7E0 50%, #FFB6D9 100%);
  border-radius: 40px 40px 50px 50px;
  border: 3px solid #FF99C8;
  z-index: 2;
  overflow: visible;
  box-shadow: 
    0 10px 30px rgba(255, 150, 200, 0.3),
    inset -5px -5px 15px rgba(255, 255, 255, 0.5),
    inset 5px 5px 15px rgba(255, 150, 200, 0.2);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 쓰레기통 눈 */
.trash-bag::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: #333;
  border-radius: 50%;
  top: 50px;
  left: 35px;
  box-shadow: 60px 0 0 #333, 8px 8px 0 2px white, 68px 8px 0 2px white;
  pointer-events: none;
  z-index: 3;
}

/* 쓰레기통 입 */
.trash-bag::after {
  content: '';
  position: absolute;
  width: 40px;
  height: 20px;
  border: 2px solid #333;
  border-top: none;
  border-radius: 0 0 20px 20px;
  bottom: 40px;
  left: 60px;
  pointer-events: none;
  z-index: 3;
}

/* 봉투 상단 매듭 (귀) */
.trash-bag-handle {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 30px;
  background: linear-gradient(135deg, #FFB6D9 0%, #FFC7E0 100%);
  border: 2px solid #FF99C8;
  border-radius: 50% 50% 0 0;
  z-index: 4;
  box-shadow: 0 -5px 10px rgba(255, 150, 200, 0.2);
}

/* 봉투 내용물 (채워지는 부분) */
.trash-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(to top, #FFD4E5 0%, #FFE0ED 100%);
  opacity: 0.8;
  transition: height 0.5s ease;
  border-radius: 0 0 47px 47px;
  z-index: 1;
}

/* 봉투 팽창 효과 */
.trash-bag.expanding {
  animation: bagExpand 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes bagExpand {
  0% { transform: scaleY(1) scaleX(1); }
  50% { transform: scaleY(1.1) scaleX(1.15); }
  100% { transform: scaleY(1) scaleX(1.12); }
}

/* 봉투 넘침 경고 */
.trash-bag.overflow {
  animation: bagOverflow 0.5s ease-in-out infinite;
}

@keyframes bagOverflow {
  0%, 100% { transform: scaleY(1) scaleX(1.12) rotate(0deg); }
  25% { transform: scaleY(1.02) scaleX(1.14) rotate(-1.5deg); }
  75% { transform: scaleY(1.02) scaleX(1.14) rotate(1.5deg); }
}

/* 채팅 인터페이스 */
.trash-chat-wrap {
  width: 100%; max-width: 500px; z-index: 10;
}
.trash-input-box {
  display: flex; gap: 10px; background: var(--surface);
  padding: 12px 16px; border-radius: 30px;
  border: 1px solid var(--border-strong);
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
.trash-input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: inherit; font-size: 14px; color: var(--text-primary);
}
.trash-send-btn {
  background: #FFB6D9; color: white; border: none;
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, background 0.2s;
  font-weight: bold;
}
.trash-send-btn:hover { transform: scale(1.1); background: #FF99C8; }

/* 애니메이션 오브젝트 */
.emotion-ball {
  position: fixed; width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #FFB6D9, #FFC7E0); color: white; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  padding: 5px; text-align: center; pointer-events: none;
  z-index: 5; box-shadow: 0 4px 10px rgba(255, 150, 200, 0.3);
  word-break: break-all; overflow: hidden; will-change: transform;
}

/* 비우기 버튼 */
.trash-actions { margin-top: 20px; display: flex; gap: 10px; }
.btn-empty {
  padding: 10px 24px; border-radius: 25px; border: none;
  background: linear-gradient(135deg, #FFB6D9, #FF99C8); color: white; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.btn-empty:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 150, 200, 0.3); }
.btn-empty:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.trash-count {
  font-size: 12px; color: var(--text-secondary); margin-top: 12px;
}

@keyframes throwToTrash {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  50% { transform: translate(var(--tx), -100px) scale(1.2); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
}

/* ── DONE PAGE ── */
#page-done {
  padding: 28px 32px;
  overflow-y: auto;
}
.done-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.done-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
.done-empty { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 13px; }
.done-list { display: flex; flex-direction: column; gap: 8px; }
.done-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
}
.done-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.done-item-text { flex: 1; font-size: 13.5px; }
.done-item-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary); }
.done-item-col { font-size: 11px; color: var(--text-secondary); background: var(--bg); border-radius: 20px; padding: 2px 10px; }
.done-restore {
  background: none; border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  color: var(--text-secondary); cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.done-restore:hover { background: var(--bg); color: var(--text-primary); }

/* ── SETTINGS PAGE ── */
#page-settings {
  padding: 28px 32px;
  overflow-y: auto;
}
.settings-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.settings-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
.settings-section { margin-bottom: 28px; }
.settings-section-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 8px;
}
.settings-row-label { font-size: 13.5px; }
.settings-row-desc { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

.theme-btns { display: flex; gap: 6px; }
.theme-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border-strong); background: var(--bg);
  cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-secondary);
  transition: background 0.1s, color 0.1s;
}
.theme-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

.danger-btn {
  padding: 6px 16px; border-radius: 6px; font-size: 12px;
  border: 1px solid #FECACA; background: #FFF8F7;
  color: #B91C1C; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.danger-btn:hover { background: #FEE2E2; }

/* ── COLUMNS ── */
.column {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--surface);
  min-height: 200px;
  max-height: calc(100vh - 100px);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  animation: fadeUp 0.25s ease both;
}
.column.drag-target { border-color: #1A1A1A; box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.col-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.col-header-top { display: flex; align-items: center; gap: 8px; }
.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.col-title-input {
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
  color: var(--text-primary); background: transparent; border: none;
  outline: none; flex: 1; cursor: text; min-width: 0;
}
.col-title-input:focus { background: var(--bg); border-radius: 4px; padding: 1px 4px; margin: -1px -4px; }
.col-count {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary);
  background: var(--bg); border-radius: 20px; padding: 2px 7px;
  border: 1px solid var(--border); margin-left: auto; flex-shrink: 0;
}
.col-desc-input {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--text-tertiary);
  background: transparent; border: none; outline: none; width: 100%;
  cursor: text; resize: none; height: 17px; overflow: hidden;
}
.col-desc-input:focus { color: var(--text-secondary); }
.col-desc-input::placeholder { color: var(--text-tertiary); font-style: italic; }
.col-header-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
.col-header:hover .col-header-actions { opacity: 1; }
.col-icon-btn {
  background: none; border: none; cursor: pointer; color: var(--text-tertiary);
  padding: 3px 5px; border-radius: 5px; font-size: 12px; line-height: 1;
  transition: background 0.1s, color 0.1s;
}
.col-icon-btn:hover { background: var(--bg); color: var(--text-secondary); }
.col-icon-btn.danger:hover { background: #FEE2E2; color: #B91C1C; }

/* ── CARDS ── */
.cards-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 7px; min-height: 60px;
}
.cards-list::-webkit-scrollbar { width: 3px; }
.cards-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  cursor: grab; user-select: none;
  transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
  position: relative; animation: cardIn 0.18s ease both;
}
@keyframes cardIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-color: var(--border-strong); }
.card.dragging { opacity: 0.28; transform: scale(0.97); cursor: grabbing; }

.card-tag {
  display: inline-block; font-size: 10px; font-weight: 500;
  font-family: 'DM Mono', monospace; padding: 2px 8px;
  border-radius: 20px; margin-bottom: 6px; letter-spacing: 0.3px;
}
.card-text { font-size: 13px; line-height: 1.5; color: var(--text-primary); word-break: break-word; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
.card-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-tertiary); }
.card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
.card:hover .card-actions { opacity: 1; }
.card-btn {
  background: none; border: none; cursor: pointer; color: var(--text-tertiary);
  padding: 2px 4px; border-radius: 4px; font-size: 11px; line-height: 1;
  transition: background 0.1s, color 0.1s;
}
.card-btn:hover { background: var(--border); color: var(--text-secondary); }
.card-btn.done-btn:hover { background: #D1FAE5; color: #065F46; }
.card-btn.danger:hover { background: #FEE2E2; color: #B91C1C; }

/* ── ADD CARD ── */
.add-card-area { padding: 7px 8px 9px; flex-shrink: 0; border-top: 1px solid var(--border); }
.add-card-input {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 12.5px;
  color: var(--text-primary); background: transparent;
  border: 1px dashed var(--border-strong); border-radius: var(--radius-sm);
  padding: 7px 10px; outline: none; resize: none; height: 34px; overflow: hidden;
  transition: border-color 0.15s, height 0.15s, background 0.15s;
}
.add-card-input::placeholder { color: var(--text-tertiary); }
.add-card-input:focus { border-style: solid; background: var(--bg); height: 66px; }
.add-card-footer { display: none; justify-content: flex-end; gap: 6px; margin-top: 5px; }
.add-card-input:focus ~ .add-card-footer { display: flex; }
.btn-cancel {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--text-secondary);
  background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer;
}
.btn-save {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 500;
  color: var(--surface); background: var(--text-primary); border: none;
  border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.8; }

/* ── ADD COL GHOST ── */
.add-col-ghost {
  width: 240px; flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius); min-height: 100px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s; color: var(--text-tertiary);
  font-size: 13px; gap: 7px;
}
.add-col-ghost:hover { background: var(--surface); border-color: var(--text-primary); color: var(--text-secondary); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 30px 10px; color: var(--text-tertiary); font-size: 12px; }
.empty-icon { font-size: 20px; margin-bottom: 4px; opacity: 0.5; }

/* ── TOAST ── */
#save-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1A1A1A; color: #fff; padding: 8px 16px; border-radius: 30px;
  font-size: 12px; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 1000; pointer-events: none;
}
#save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); width: 100%; max-width: 380px;
  border-radius: var(--radius); padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transform: scale(0.95); transition: transform 0.2s;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: scale(1); }

.modal-title { font-size: 17px; font-weight: 500; margin-bottom: 20px; }
.modal-field { margin-bottom: 16px; }
.modal-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.modal-input {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
  padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text-primary); outline: none;
  transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--text-primary); }
.modal-textarea {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
  padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text-primary); outline: none;
  transition: border-color 0.15s; resize: vertical; min-height: 80px;
}
.modal-textarea:focus { border-color: var(--text-primary); }

.color-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 8px; }
.color-swatch {
  width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.selected { border-color: var(--text-primary); transform: scale(1.1); }

.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* 쓰레기 내용 리스트 */
.trash-items-list {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 16px;
  max-height: 300px;
  overflow-y: auto;
}
.trash-item-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.4;
}
.trash-item-preview:last-child { margin-bottom: 0; }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="lnb-toggle" id="lnb-toggle" onclick="toggleLnb()" title="LNB 닫기" aria-label="LNB 닫기">

<div class="layout">

        <path d="M3 6h12M5 6v10a2 2 0 002 2h4a2 2 0 002-2V6M8 6V4a2 2 0 012-2h0a2 2 0 012 2v2"/>

    </button>

    <div class="lnb-divider"></div>

        <line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- BOARD -->
<div id="page-board" class="page active">

</div>

    <!-- DASHBOARD -->

<script>
const COLORS = [
  { dot:'#EF4444', tag:'#FEE2E2', tagText:'#B91C1C', colBg:'#FFF8F7', colBorder:'#FECACA' },
  { dot:'#F59E0B', tag:'#FEF3C7', tagText:'#92400E', colBg:'#FFFBEB', colBorder:'#FDE68A' },

function playPaperCrumpleSound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    const noise = audioContext.createBufferSource();
    const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.22, audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
    const noiseGain = audioContext.createGain();
    const filter = audioContext.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 3500;
    filter.Q.value = 0.3;
    noise.buffer = buffer;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioContext.destination);
    noiseGain.gain.setValueAtTime(0.12, now);
    noiseGain.gain.linearRampToValueAtTime(0.16, now + 0.04);
    noiseGain.gain.exponentialRampToValueAtTime(0.015, now + 0.22);
    noise.start(now);
    noise.stop(now + 0.22);
  } catch(e) {}
}

function playTrashEmptySound() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioContext.currentTime;
    const noise = audioContext.createBufferSource();
    const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.35, audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    const noiseGain = audioContext.createGain();
    const filter = audioContext.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2000;
    filter.Q.value = 0.4;
    noise.buffer = buffer;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioContext.destination);
    noiseGain.gain.setValueAtTime(0.08, now);
    noiseGain.gain.linearRampToValueAtTime(0.12, now + 0.1);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
    noise.start(now);
    noise.stop(now + 0.35);
    const osc = audioContext.createOscillator();
    const oscGain = audioContext.createGain();
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(70, now + 0.3);
    osc.connect(oscGain);
    oscGain.connect(audioContext.destination);
    oscGain.gain.setValueAtTime(0.08, now);
    oscGain.gain.exponentialRampToValueAtTime(0.005, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  } catch(e) {}
}

// ── EMOTION TRASH LOGIC
function updateTrashFill() {
  const fill = document.getElementById('trash-fill');
  const bag = document.getElementById('trash-bag');
  const count = trashItems.length;
  
  if(!fill || !bag) return;
  
  const level = Math.min(count * 10, 100);
  fill.style.height = level + '%';
  
  const countEl = document.getElementById('trash-count');
  if(countEl) countEl.textContent = `버린 감정: ${count}개`;
  
  const btn = document.getElementById('btn-empty-trash');
  if(btn) btn.disabled = count === 0;
  
  if (count >= 10) {
    bag.classList.add('overflow');
    if (count === 10) {
      alert('⚠️ 감정 쓰레기통이 가득 찼습니다!\n\n10개 이상의 감정이 쌓여있습니다. 마음을 비우고 새로 시작해 보세요.');
    }
  } else {
    bag.classList.remove('overflow');
  }
}

function throwEmotion() {
  const input = document.getElementById('trash-input');
  const text = input.value.trim();
  if (!text) return;

  const bag = document.getElementById('trash-bag');
  
  playPaperCrumpleSound();
  
  bag.classList.add('expanding');
  setTimeout(() => bag.classList.remove('expanding'), 600);
  
  const ball = document.createElement('div');
  ball.className = 'emotion-ball';
  ball.textContent = text.length > 10 ? text.substring(0, 10) + '...' : text;
  
  const inputRect = document.getElementById('trash-input').getBoundingClientRect();
  const bagRect = bag.getBoundingClientRect();
  
  const startX = inputRect.left + inputRect.width / 2 - 20;
  const startY = inputRect.top - 20;
  const endX = bagRect.left + bagRect.width / 2 - 20;
  const endY = bagRect.top + bagRect.height / 2 - 20;
  
  ball.style.left = startX + 'px';
  ball.style.top = startY + 'px';
  
  const tx = endX - startX;
  const ty = endY - startY;
  
  ball.style.setProperty('--tx', tx + 'px');
  ball.style.setProperty('--ty', ty + 'px');
  ball.style.animation = 'throwToTrash 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards';
  
  document.body.appendChild(ball);
  
  trashItems.push({ text, date: new Date().toISOString() });
  saveTrash();
  
  input.value = '';
  
  setTimeout(() => {
    ball.remove();
  }, 800);
}

function analyzeKeywords(items) {
  const commonKeywords = ['업무', '인간관계', '미래', '불안', '짜증', '피곤', '슬픔', '후회', '스트레스', '외로움', '답답함'];
  const found = [];
  const allText = items.map(i => i.text).join(' ');
  
  commonKeywords.forEach(k => {
    if (allText.includes(k)) found.push(k);
  });
  
  if (found.length === 0) found.push('일상적인 고민');
  return found.slice(0, 3);
}

function generateEvaluation(keywords) {
  const evals = [
    "무거운 마음을 여기까지 가져오느라 고생 많으셨어요. 버려진 감정들은 이제 당신을 괴롭히지 못할 거예요.",
    "힘든 순간들을 잘 견뎌내고 계시네요. 감정을 쏟아내는 것만으로도 마음의 짐이 훨씬 가벼워질 수 있습니다.",
    "당신은 생각보다 훨씬 강한 사람이에요. 오늘 버린 이 고민들이 내일의 당신을 더 성장하게 만들 거예요.",
    "가끔은 쉬어가도 괜찮아요. 모든 것을 완벽하게 해내려 하지 마세요. 당신은 존재만으로도 충분합니다."
  ];
  return evals[Math.floor(Math.random() * evals.length)];
}

function getPlantStage() {
  if (plantXp >= 12) return 5;
  if (plantXp >= 8) return 4;
  if (plantXp >= 5) return 3;
  if (plantXp >= 2) return 2;
  if (plantXp >= 1) return 1;
  return 0;
}
function renderPlant(animate = false) {
  const widget = document.getElementById('plant-widget');
  const status = document.getElementById('plant-status');
  if (!widget || !status) return;


  const stage = getPlantStage();
  widget.dataset.stage = stage;
  widget.style.setProperty('--plant-growth', stage);

  const goals = [1, 2, 5, 8, 12];
  const nextGoal = stage === 5 ? '만개했습니다' : `다음 성장까지 ${goals[stage] - plantXp}개`;
  status.textContent = `완료한 일정 ${plantXp}개 · ${nextGoal}`;

  if (animate) {
    widget.classList.remove('grow-pulse');
    void widget.offsetWidth;
    widget.classList.add('grow-pulse');
  }
}
function growPlant() {
  plantXp += 1;
  localStorage.setItem('priorify_plant_xp', String(plantXp));
  renderPlant(true);
}
// ── DONE
function markDone(e, cardId) {
  e.preventDefault(); e.stopPropagation();
  let found = null, fromColName = '';
  columns.forEach(col => {
    const idx = col.cards.findIndex(c => c.id === cardId);
    if (idx !== -1) { found = col.cards.splice(idx, 1)[0]; fromColName = col.name; }
  });
    if (found) {
      doneItems.unshift({ ...found, colName: fromColName, doneAt: today() });
      growPlant();
      saveDone();
      saveData();
      render();
    }
  }

function renderDone() {
  const wrap = document.getElementById('done-list-wrap');
  if (!wrap) return;
  if (doneItems.length === 0) {
    wrap.innerHTML = '<div class="done-empty">완료된 항목이 없어요 ✓</div>';
    return;
  }
  wrap.innerHTML = '<div class="done-list">' + doneItems.map((item, i) => {
    const col = columns.find(c => c.name === item.colName);
    const color = col ? COLORS[col.colorIdx] : COLORS[7];
    return `<div class="done-item">
      <div class="done-item-dot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${color.dot}"></div>
      <div class="done-item-text">${esc(item.text)}</div>

      <span class="done-item-meta">${item.doneAt}</span>
      <button class="done-restore" onclick="restoreDone(${i})">되돌리기</button>
    </div>`;
  }).join('') + '</div>';
}

function restoreDone(i) {
  const item = doneItems.splice(i, 1)[0];
  const col = columns.find(c => c.name === item.colName) || columns[0];
  if (col) { const { colName, doneAt, ...card } = item; col.cards.push(card); }
  saveDone(); saveData(); renderDone();
}

function clearDone() {
  if (!confirm('완료 목록을 모두 비울까요?')) return;
  doneItems = []; saveDone();
  if (currentPage === 'done') renderDone();
}

// ── DRAG
function onCardDragStart(e, cardId, colId) {
  dragCardId = cardId; dragFromColId = colId;
  setTimeout(() => { const el = document.querySelector(`[data-card-id="${cardId}"]`); if (el) el.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onCardDragEnd() {
  dragCardId = null; dragFromColId = null;
  document.querySelectorAll('.card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.column.drag-target').forEach(el => el.classList.remove('drag-target'));
}
function onCardDragOver(e, colId) {
  if (!dragCardId) return; e.preventDefault();
  const colEl = document.querySelector(`[data-col-id="${colId}"]`);
  if (colEl) colEl.classList.add('drag-target');
}
function onCardDrop(e, targetColId) {
  e.preventDefault(); if (!dragCardId) return;
  if (dragFromColId === targetColId) { onCardDragEnd(); return; }
  const fromCol = columns.find(c => c.id === dragFromColId);
  const toCol = columns.find(c => c.id === targetColId);
  if (!fromCol || !toCol) return;
  const idx = fromCol.cards.findIndex(c => c.id === dragCardId);
  if (idx === -1) return;
  const [card] = fromCol.cards.splice(idx, 1);
  toCol.cards.push(card);
  saveData(); render();
}

// ── CARD ACTIONS
function deleteCard(e, cardId) {
  e.preventDefault(); e.stopPropagation();
  columns.forEach(col => { col.cards = col.cards.filter(c => c.id !== cardId); });
  saveData(); render();
}
function handleCardInput(e, colId, textarea) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addCardFromInput(colId, textarea); }
  if (e.key === 'Escape') { textarea.value = ''; textarea.blur(); }
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 88) + 'px';
}
function blurCardInput(e, colId, textarea) {
  setTimeout(() => { const f = textarea.parentElement.querySelector('.add-card-footer'); if (f) f.style.display = 'none'; }, 150);
}
function saveCardInput(e, colId) {
  const area = e.target.closest('.add-card-area');
  addCardFromInput(colId, area.querySelector('.add-card-input'));
}
function cancelCardInput(e) {
  const area = e.target.closest('.add-card-area');
  const ta = area.querySelector('.add-card-input'); ta.value = ''; ta.blur();
}
function addCardFromInput(colId, textarea) {
  const text = textarea.value.trim(); if (!text) return;
  const col = columns.find(c => c.id === colId); if (!col) return;
  col.cards.push({ id: genId(), text, date: today() });
  textarea.value = ''; textarea.style.height = 'auto';
  saveData(); render();
}

// ── CARD EDIT MODAL
function openEditCardModal(e, cardId) {
  e.preventDefault(); e.stopPropagation();
  editingCardId = cardId;
  let card = null;
  columns.forEach(col => {
    const found = col.cards.find(c => c.id === cardId);
    if (found) card = found;
  });
  if (!card) return;
  
  document.getElementById('modal-card-text').value = card.text;
  document.getElementById('card-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-card-text').focus(), 50);
}

function closeCardModal(e) { if (e.target === document.getElementById('card-modal-overlay')) closeCardModalDirect(); }
function closeCardModalDirect() { document.getElementById('card-modal-overlay').classList.remove('open'); editingCardId = null; }

function confirmCardEdit() {
  const text = document.getElementById('modal-card-text').value.trim();
  if (!text) { document.getElementById('modal-card-text').focus(); return; }
  
  columns.forEach(col => {
    const card = col.cards.find(c => c.id === editingCardId);
    if (card) { card.text = text; }
  });
  
  closeCardModalDirect();
  saveData();
  render();
}

// ── COLUMN ACTIONS
function renameCol(colId, name) { const c = columns.find(c => c.id === colId); if (c) { c.name = name; saveData(); renderLnbCols(); } }
function editColDesc(colId, desc) { const c = columns.find(c => c.id === colId); if (c) { c.desc = desc; saveData(); } }
function deleteCol(colId) {
  if (!confirm('이 컬럼을 삭제할까요?')) return;
  columns = columns.filter(c => c.id !== colId);
  saveData(); render();
}
function resetData() {
  if (!confirm('모든 데이터를 초기화할까요?')) return;
  columns = JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
  saveData(); render();
}

// ── MODAL
function openAddColModal() {
  editingColId = null;
  document.getElementById('modal-title').textContent = '새 컬럼 추가';
  document.getElementById('modal-confirm-btn').textContent = '추가';
  document.getElementById('modal-col-name').value = '';
  document.getElementById('modal-col-desc').value = '';
  selectedColorIdx = 0; renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-col-name').focus(), 50);
}
function openEditColModal(colId) {
  editingColId = colId;
  const col = columns.find(c => c.id === colId); if (!col) return;
  document.getElementById('modal-title').textContent = '컬럼 편집';
  document.getElementById('modal-confirm-btn').textContent = '저장';
  document.getElementById('modal-col-name').value = col.name;
  document.getElementById('modal-col-desc').value = col.desc;
  selectedColorIdx = col.colorIdx; renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-col-name').focus(), 50);
}
function renderColorPicker() {
  const picker = document.getElementById('color-picker'); picker.innerHTML = '';
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === selectedColorIdx ? ' selected' : '');
    sw.style.background = c.dot;
    sw.onclick = () => { selectedColorIdx = i; renderColorPicker(); };
    picker.appendChild(sw);
  });
}
function confirmModal() {
  const name = document.getElementById('modal-col-name').value.trim();
  if (!name) { document.getElementById('modal-col-name').focus(); return; }
  const desc = document.getElementById('modal-col-desc').value.trim();
  if (editingColId) {
    const col = columns.find(c => c.id === editingColId);
    if (col) { col.name = name; col.desc = desc; col.colorIdx = selectedColorIdx; }
  } else {
    columns.push({ id: genId(), name, desc, colorIdx: selectedColorIdx, cards: [] });
  }
  closeModalDirect(); saveData(); render();
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); editingColId = null; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModalDirect();
    closeCardModalDirect();
    closeTrashReviewModal();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('modal-overlay').classList.contains('open') && document.activeElement.tagName !== 'TEXTAREA') confirmModal();
    if (document.getElementById('card-modal-overlay').classList.contains('open') && document.activeElement.tagName !== 'TEXTAREA') confirmCardEdit();
  }
});

initLnbState();
render();
renderPlant();
updateTrashFill();
</script>
</body>
</html>
