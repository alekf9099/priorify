<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priorify — 일정 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #A8A8A8;
    --accent: #1A1A1A;
    --radius: 12px;
    --radius-sm: 8px;

    --col-critical-bg: #FFF8F7;
    --col-critical-border: #FECACA;
    --col-critical-dot: #EF4444;
    --col-critical-tag: #FEE2E2;
    --col-critical-tag-text: #B91C1C;

    --col-urgent-bg: #FFFBEB;
    --col-urgent-border: #FDE68A;
    --col-urgent-dot: #F59E0B;
    --col-urgent-tag: #FEF3C7;
    --col-urgent-tag-text: #92400E;

    --col-important-bg: #F0F9FF;
    --col-important-border: #BAE6FD;
    --col-important-dot: #0EA5E9;
    --col-important-tag: #E0F2FE;
    --col-important-tag-text: #0369A1;

    --col-low-bg: #F9FAFB;
    --col-low-border: #E5E7EB;
    --col-low-dot: #9CA3AF;
    --col-low-tag: #F3F4F6;
    --col-low-tag-text: #4B5563;
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    user-select: none;
  }

  .logo span { color: var(--text-tertiary); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .today-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
  }

  .btn-add-col {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-col:hover { background: var(--bg); }
  .btn-add-col svg { flex-shrink: 0; }

  /* ── BOARD ── */
  #board-wrap {
    flex: 1;
    overflow-x: auto;
    padding: 28px 32px 32px;
  }

  #board {
    display: flex;
    gap: 16px;
    min-height: calc(100vh - 140px);
    align-items: flex-start;
  }

  /* ── COLUMN ── */
  .column {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    min-height: 200px;
    max-height: calc(100vh - 160px);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .column.drag-target { border-color: #1A1A1A; box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .col-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: default;
  }

  .col-header-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .col-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-title-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    background: transparent;
    border: none;
    outline: none;
    flex: 1;
    cursor: text;
    min-width: 0;
  }
  .col-title-input:focus { background: var(--bg); border-radius: 4px; padding: 1px 4px; margin: -1px -4px; }

  .col-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg);
    border-radius: 20px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    margin-left: auto;
    flex-shrink: 0;
  }

  .col-desc-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-tertiary);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    cursor: text;
    resize: none;
    height: 18px;
    overflow: hidden;
  }
  .col-desc-input:focus { color: var(--text-secondary); }
  .col-desc-input::placeholder { color: var(--text-tertiary); font-style: italic; }

  .col-header-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .col-header:hover .col-header-actions { opacity: 1; }

  .col-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    padding: 3px 5px;
    border-radius: 5px;
    font-size: 13px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
  }
  .col-icon-btn:hover { background: var(--bg); color: var(--text-secondary); }
  .col-icon-btn.danger:hover { background: #FEE2E2; color: #B91C1C; }

  /* ── CARDS ── */
  .cards-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .cards-list::-webkit-scrollbar { width: 4px; }
  .cards-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
    position: relative;
    animation: cardIn 0.2s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-color: var(--border-strong); }
  .card.dragging { opacity: 0.3; transform: scale(0.97); cursor: grabbing; }
  .card.drag-ghost { box-shadow: 0 8px 24px rgba(0,0,0,0.14); transform: rotate(1.5deg) scale(1.02); opacity: 1; }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 7px;
    letter-spacing: 0.3px;
  }

  .card-text {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text-primary);
    word-break: break-word;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
  }

  .card-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .card:hover .card-actions { opacity: 1; }

  .card-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
  }
  .card-btn:hover { background: var(--border); color: var(--text-secondary); }
  .card-btn.danger:hover { background: #FEE2E2; color: #B91C1C; }

  /* ── ADD CARD AREA ── */
  .add-card-area {
    padding: 8px 10px 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .add-card-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    outline: none;
    resize: none;
    height: 36px;
    overflow: hidden;
    transition: border-color 0.15s, height 0.15s, background 0.15s;
  }
  .add-card-input::placeholder { color: var(--text-tertiary); }
  .add-card-input:focus { border-color: var(--border-strong); border-style: solid; background: var(--bg); height: 70px; }

  .add-card-footer {
    display: none;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 6px;
  }
  .add-card-input:focus ~ .add-card-footer { display: flex; }

  .btn-cancel {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
  }
  .btn-save {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--surface);
    background: var(--text-primary);
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.8; }

  /* ── ADD COLUMN GHOST ── */
  .add-col-ghost {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius);
    min-height: 120px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    color: var(--text-tertiary);
    font-size: 13px;
    gap: 8px;
  }
  .add-col-ghost:hover { background: var(--surface); border-color: var(--text-primary); color: var(--text-secondary); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 20px;
    color: var(--text-primary);
  }

  .modal-field {
    margin-bottom: 14px;
  }
  .modal-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--text-primary); }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text-primary); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 24px 12px;
    color: var(--text-tertiary);
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
  }
  .empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.4; }

  /* ── TOAST ── */
  #save-toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 8px 16px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  #save-toast.show { opacity: 1; transform: translateY(0); }

  /* Drop placeholder */
  .drop-placeholder {
    height: 4px;
    background: var(--text-primary);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    margin: 0 -2px;
  }
  .drop-placeholder.visible { opacity: 0.25; height: 36px; background: rgba(26,26,26,0.05); border: 1.5px dashed rgba(26,26,26,0.2); border-radius: var(--radius-sm); }
</style>
</head>
<body>

<header>
  <div class="logo">priorify<span>.</span></div>
  <div class="header-right">
    <div class="today-badge" id="today-badge"></div>
    <button class="btn-add-col" onclick="openAddColModal()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/>
      </svg>
      새 컬럼
    </button>
  </div>
</header>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="save-toast">저장됨 ✓</div>

<!-- Add Column Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">새 컬럼 추가</div>
    <div class="modal-field">
      <label class="modal-label">컬럼 이름</label>
      <input class="modal-input" id="modal-col-name" placeholder="예: 중요 & 급함" maxlength="30">
    </div>
    <div class="modal-field">
      <label class="modal-label">설명 (선택)</label>
      <input class="modal-input" id="modal-col-desc" placeholder="짧은 설명을 입력하세요" maxlength="50">
    </div>
    <div class="modal-field">
      <label class="modal-label">색상</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">취소</button>
      <button class="btn-save" id="modal-confirm-btn" onclick="confirmModal()">추가</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { dot: '#EF4444', tag: '#FEE2E2', tagText: '#B91C1C', colBg: '#FFF8F7', colBorder: '#FECACA' },
  { dot: '#F59E0B', tag: '#FEF3C7', tagText: '#92400E', colBg: '#FFFBEB', colBorder: '#FDE68A' },
  { dot: '#10B981', tag: '#D1FAE5', tagText: '#065F46', colBg: '#F0FDF9', colBorder: '#A7F3D0' },
  { dot: '#0EA5E9', tag: '#E0F2FE', tagText: '#0369A1', colBg: '#F0F9FF', colBorder: '#BAE6FD' },
  { dot: '#8B5CF6', tag: '#EDE9FE', tagText: '#5B21B6', colBg: '#FAF5FF', colBorder: '#DDD6FE' },
  { dot: '#EC4899', tag: '#FCE7F3', tagText: '#9D174D', colBg: '#FFF1F8', colBorder: '#FBCFE8' },
  { dot: '#6366F1', tag: '#E0E7FF', tagText: '#3730A3', colBg: '#F8F8FF', colBorder: '#C7D2FE' },
  { dot: '#9CA3AF', tag: '#F3F4F6', tagText: '#4B5563', colBg: '#F9FAFB', colBorder: '#E5E7EB' },
];

const DEFAULT_COLUMNS = [
  { id: 'critical', name: '중요 & 급함', desc: '즉시 처리 필요', colorIdx: 0, cards: [
    { id: 'c1', text: '오늘 마감 보고서 제출', date: today() },
    { id: 'c2', text: '클라이언트 미팅 준비', date: today() },
  ]},
  { id: 'important', name: '중요 & 안급함', desc: '계획 세워서 처리', colorIdx: 3, cards: [
    { id: 'c3', text: '장기 목표 로드맵 작성', date: today() },
  ]},
  { id: 'urgent', name: '안중요 & 급함', desc: '빠르게 처리하거나 위임', colorIdx: 1, cards: [
    { id: 'c4', text: '이메일 답장 처리', date: today() },
  ]},
  { id: 'low', name: '안중요 & 안급함', desc: '여유 있을 때', colorIdx: 7, cards: [
    { id: 'c5', text: '읽을 아티클 정리', date: today() },
  ]},
];

function loadData() {
  try {
    const saved = localStorage.getItem('priorify_columns');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return DEFAULT_COLUMNS;
}

function saveData() {
  try {
    localStorage.setItem('priorify_columns', JSON.stringify(columns));
    showSavedToast();
  } catch(e) {}
}

let columns = loadData();

let nextId = 10;
let dragCardId = null, dragFromColId = null;
let dragColId = null;
let editingColId = null;
let selectedColorIdx = 0;

function today() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function genId() { return 'id' + (nextId++); }

// ── DATE BADGE
document.getElementById('today-badge').textContent = (() => {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${days[d.getDay()]}요일`;
})();

let toastTimer = null;
function showSavedToast() {
  const t = document.getElementById('save-toast');
  if (!t) return;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── RENDER
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  columns.forEach((col, colIdx) => {
    const color = COLORS[col.colorIdx];
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;
    colEl.style.borderColor = color.colBorder;

    colEl.innerHTML = `
      <div class="col-header" style="background:${color.colBg}">
        <div class="col-header-top">
          <div class="col-dot" style="background:${color.dot}"></div>
          <input class="col-title-input" value="${esc(col.name)}" placeholder="컬럼 이름"
            onchange="renameCol('${col.id}', this.value)"
            onclick="event.stopPropagation()">
          <span class="col-count">${col.cards.length}</span>
          <div class="col-header-actions">
            <button class="col-icon-btn" title="컬럼 편집" onclick="openEditColModal('${col.id}')">✎</button>
            <button class="col-icon-btn danger" title="컬럼 삭제" onclick="deleteCol('${col.id}')">✕</button>
          </div>
        </div>
        <input class="col-desc-input" value="${esc(col.desc)}" placeholder="짧은 설명…"
          onchange="editColDesc('${col.id}', this.value)"
          onclick="event.stopPropagation()">
      </div>
      <div class="cards-list" data-col-id="${col.id}">
        ${col.cards.length === 0 ? `<div class="empty-state"><div class="empty-icon">◦</div>할 일 없음</div>` : ''}
        ${col.cards.map(card => renderCard(card, color)).join('')}
      </div>
      <div class="add-card-area">
        <textarea class="add-card-input" placeholder="+ 할 일 추가…" rows="1"
          onkeydown="handleCardInput(event, '${col.id}', this)"
          onfocus="this.parentElement.querySelector('.add-card-footer').style.display='flex'"
          onblur="blurCardInput(event, '${col.id}', this)"></textarea>
        <div class="add-card-footer" style="display:none">
          <button class="btn-cancel" onmousedown="cancelCardInput(event)">취소</button>
          <button class="btn-save" onmousedown="saveCardInput(event, '${col.id}')">저장</button>
        </div>
      </div>
    `;

    board.appendChild(colEl);

    // drag events for cards list
    const list = colEl.querySelector('.cards-list');
    list.addEventListener('dragover', e => onCardDragOver(e, col.id));
    list.addEventListener('drop', e => onCardDrop(e, col.id));
    list.addEventListener('dragleave', e => { if (!list.contains(e.relatedTarget)) { colEl.classList.remove('drag-target'); } });

    // card drag events
    colEl.querySelectorAll('.card').forEach(cardEl => {
      cardEl.addEventListener('dragstart', e => onCardDragStart(e, cardEl.dataset.cardId, col.id));
      cardEl.addEventListener('dragend', onCardDragEnd);
    });
  });

  // add column ghost
  const ghost = document.createElement('div');
  ghost.className = 'add-col-ghost';
  ghost.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg> 컬럼 추가`;
  ghost.onclick = openAddColModal;
  board.appendChild(ghost);
}

function renderCard(card, color) {
  return `<div class="card" draggable="true" data-card-id="${card.id}">
    <div class="card-tag" style="background:${color.tag};color:${color.tagText}"></div>
    <div class="card-text">${esc(card.text)}</div>
    <div class="card-meta">
      <span class="card-date">${card.date}</span>
      <div class="card-actions">
        <button class="card-btn danger" onmousedown="deleteCard(event, '${card.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CARD DRAG
function onCardDragStart(e, cardId, colId) {
  dragCardId = cardId;
  dragFromColId = colId;
  setTimeout(() => {
    const el = document.querySelector(`[data-card-id="${cardId}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
  e.dataTransfer.effectAllowed = 'move';
}

function onCardDragEnd() {
  dragCardId = null;
  dragFromColId = null;
  document.querySelectorAll('.card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.column.drag-target').forEach(el => el.classList.remove('drag-target'));
}

function onCardDragOver(e, colId) {
  if (!dragCardId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const colEl = document.querySelector(`[data-col-id="${colId}"]`);
  if (colEl) colEl.classList.add('drag-target');
}

function onCardDrop(e, targetColId) {
  e.preventDefault();
  if (!dragCardId) return;
  if (dragFromColId === targetColId) { onCardDragEnd(); return; }

  const fromCol = columns.find(c => c.id === dragFromColId);
  const toCol = columns.find(c => c.id === targetColId);
  if (!fromCol || !toCol) return;

  const idx = fromCol.cards.findIndex(c => c.id === dragCardId);
  if (idx === -1) return;
  const [card] = fromCol.cards.splice(idx, 1);
  toCol.cards.push(card);
  saveData();
  render();
}

// ── CARD ACTIONS
function deleteCard(e, cardId) {
  e.preventDefault();
  e.stopPropagation();
  columns.forEach(col => { col.cards = col.cards.filter(c => c.id !== cardId); });
  saveData();
  render();
}

function handleCardInput(e, colId, textarea) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addCardFromInput(colId, textarea);
  }
  if (e.key === 'Escape') {
    textarea.value = '';
    textarea.blur();
  }
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 90) + 'px';
}

function blurCardInput(e, colId, textarea) {
  setTimeout(() => {
    const footer = textarea.parentElement.querySelector('.add-card-footer');
    if (footer) footer.style.display = 'none';
  }, 150);
}

function saveCardInput(e, colId) {
  const area = e.target.closest('.add-card-area');
  const textarea = area.querySelector('.add-card-input');
  addCardFromInput(colId, textarea);
}

function cancelCardInput(e) {
  const area = e.target.closest('.add-card-area');
  const textarea = area.querySelector('.add-card-input');
  textarea.value = '';
  textarea.blur();
}

function addCardFromInput(colId, textarea) {
  const text = textarea.value.trim();
  if (!text) return;
  const col = columns.find(c => c.id === colId);
  if (!col) return;
  col.cards.push({ id: genId(), text, date: today() });
  textarea.value = '';
  textarea.style.height = 'auto';
  saveData();
  render();
}

// ── COLUMN ACTIONS
function renameCol(colId, name) {
  const col = columns.find(c => c.id === colId);
  if (col) { col.name = name; saveData(); }
}
function editColDesc(colId, desc) {
  const col = columns.find(c => c.id === colId);
  if (col) { col.desc = desc; saveData(); }
}
function deleteCol(colId) {
  if (!confirm('이 컬럼을 삭제할까요? 카드도 모두 삭제됩니다.')) return;
  columns = columns.filter(c => c.id !== colId);
  saveData();
  render();
}

// ── MODAL
function openAddColModal() {
  editingColId = null;
  document.getElementById('modal-title').textContent = '새 컬럼 추가';
  document.getElementById('modal-confirm-btn').textContent = '추가';
  document.getElementById('modal-col-name').value = '';
  document.getElementById('modal-col-desc').value = '';
  selectedColorIdx = 0;
  renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-col-name').focus(), 50);
}

function openEditColModal(colId) {
  editingColId = colId;
  const col = columns.find(c => c.id === colId);
  if (!col) return;
  document.getElementById('modal-title').textContent = '컬럼 편집';
  document.getElementById('modal-confirm-btn').textContent = '저장';
  document.getElementById('modal-col-name').value = col.name;
  document.getElementById('modal-col-desc').value = col.desc;
  selectedColorIdx = col.colorIdx;
  renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-col-name').focus(), 50);
}

function renderColorPicker() {
  const picker = document.getElementById('color-picker');
  picker.innerHTML = '';
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === selectedColorIdx ? ' selected' : '');
    sw.style.background = c.dot;
    sw.onclick = () => { selectedColorIdx = i; renderColorPicker(); };
    picker.appendChild(sw);
  });
}

function confirmModal() {
  const name = document.getElementById('modal-col-name').value.trim();
  if (!name) { document.getElementById('modal-col-name').focus(); return; }
  const desc = document.getElementById('modal-col-desc').value.trim();

  if (editingColId) {
    const col = columns.find(c => c.id === editingColId);
    if (col) { col.name = name; col.desc = desc; col.colorIdx = selectedColorIdx; }
  } else {
    columns.push({ id: genId(), name, desc, colorIdx: selectedColorIdx, cards: [] });
  }
  closeModalDirect();
  saveData();
  render();
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingColId = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') confirmModal();
  }
});

render();
</script>
</body>
</html>
